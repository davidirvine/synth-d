name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest

    steps:
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        id: release
        with:
          # PAT required: GITHUB_TOKEN does not trigger downstream workflows on push
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Open backmerge PR to develop
        if: steps.release.outputs.release_created
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          gh pr create \
            --base develop \
            --head main \
            --title "chore: backmerge release ${{ steps.release.outputs.tag_name }} to develop" \
            --body "Brings the version bump from the ${{ steps.release.outputs.tag_name }} release back to develop so the next promotion PR is conflict-free." \
          || echo "Backmerge PR already exists"
