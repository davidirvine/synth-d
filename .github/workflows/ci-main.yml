name: CI — PRs to main

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Restore Faust WASM cache
        id: faust-cache
        uses: actions/cache@v4
        with:
          path: |
            public/synth.wasm
            public/synth.js
            public/synth.json
          key: faust-v2-${{ hashFiles('faust/synth.dsp') }}
          restore-keys: |
            faust-v2-

      - name: Install Faust compiler
        if: steps.faust-cache.outputs.cache-hit != 'true'
        run: sudo apt-get update && sudo apt-get install -y faust

      - name: Build Faust WASM
        if: steps.faust-cache.outputs.cache-hit != 'true'
        run: npm run faust:build

      - name: Restore Playwright browser cache
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('node_modules/@playwright/test/package.json') }}

      # System libs are NOT cached; runner is a fresh VM on every run.
      # install-deps must run unconditionally so browsers can execute on cache hit.
      - name: Install Playwright system dependencies
        run: npx playwright install-deps chromium

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium

      - name: Run unit tests
        run: npx vitest run

      - name: Run e2e tests
        run: npx playwright test
