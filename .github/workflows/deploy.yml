name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: pages
  # false: let the in-flight deploy finish; the next one queues rather than canceling mid-push
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Restore Faust WASM cache
        id: faust-cache
        uses: actions/cache@v4
        with:
          path: |
            public/synth.wasm
            public/synth.js
            public/synth.json
          key: faust-v2-${{ hashFiles('faust/synth.dsp') }}
          restore-keys: |
            faust-v2-

      - name: Install Faust compiler
        if: steps.faust-cache.outputs.cache-hit != 'true'
        run: sudo apt-get update && sudo apt-get install -y faust

      - name: Build Faust WASM
        if: steps.faust-cache.outputs.cache-hit != 'true'
        run: npm run faust:build

      - name: Build
        run: npm run build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
